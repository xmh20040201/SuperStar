name: 刷课
run-name: 刷课

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 8 * * *"

jobs:
  Start:
    runs-on: ubuntu-latest
    steps:
      - name: 拷贝代码
        uses: actions/checkout@v4

      - name: 设置python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖包
        run: |
          pip install -r ./requirements.txt

      - name: 生成配置文件
        run: |
          cat > config.ini << 'CONFIGEOF'
          [common]
          username = ${{ secrets.CHAOXING_USERNAME }}
          password = ${{ secrets.CHAOXING_PASSWORD }}
          course_list = 261180551,261797302,261797310,223283657,240687294,220005691,260367564,261106415
          speed = 1
          jobs = 4
          notopen_action = retry

          [tiku]
          provider = ${{ secrets.TIKU_PROVIDER || 'TikuGo' }}
          submit = true
          cover_rate = 0.9
          delay = 1.0
          true_list = 正确,对,√,是
          false_list = 错误,错,×,否,不对,不正确
          tokens = ${{ secrets.TIKU_TOKENS || '' }}
          url = ${{ secrets.TIKUADAPTER_URL || '' }}
          go_authorization =
          go_min_interval = 1.0
          go_retry_times = 3
          go_retry_backoff = 1.2
          siliconflow_key = ${{ secrets.SILICONFLOW_KEY || '' }}
          siliconflow_model = deepseek-ai/DeepSeek-V4-Flash
          siliconflow_endpoint = https://api.siliconflow.cn/v1/chat/completions
          check_llm_connection = true
          min_interval_seconds = 3
          CONFIGEOF

      - name: Run main.py
        run: python main.py -c config.ini
