name: 刷课
run-name: 刷课

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 8 * * *"

jobs:
  Start:
    runs-on: ubuntu-latest
    steps:
      - name: 拷贝代码
        uses: actions/checkout@v4

      - name: 设置python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖包
        run: |
          pip install -r ./requirements.txt

      - name: 生成配置文件
        run: |
          cat > config.ini << 'CONFIGEOF'
          [common]
          username = ${{ secrets.CHAOXING_USERNAME }}
          password = ${{ secrets.CHAOXING_PASSWORD }}
          course_list = ${{ secrets.CHAOXING_COURSE_LIST }}
          speed = 1
          jobs = 4
          notopen_action = retry

          [tiku]
          provider = ${{ secrets.TIKU_PROVIDER || 'TikuYanxi' }}
          submit = true
          cover_rate = 0.9
          delay = 1.0
          true_list = 正确,对,√,是
          false_list = 错误,错,×,否,不对,不正确
          tokens = ${{ secrets.TIKU_TOKENS || '' }}
          url = ${{ secrets.TIKUADAPTER_URL || '' }}
          CONFIGEOF

      - name: Run main.py
        run: python main.py -c config.ini
